name: build

on:
  push:
    branches: [master, develop, 'features/**', 'feat/**', 'ci/**']
  pull_request:
    branches: [master, develop]

jobs:
  build:
    name: build (${{ matrix.container }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - debian:trixie
          - debian:bookworm
          - ubuntu:24.04

    steps:
      - name: install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential libc6-dev ca-certificates git

      - uses: actions/checkout@v4

      - name: configure
        run: ./configure

      - name: build
        run: make

      - name: verify binary
        run: |
          test -x ./src/services
          ls -la ./src/services

      - uses: actions/upload-artifact@v4
        if: matrix.container == 'debian:trixie'
        with:
          name: services-binary
          path: src/services
          retention-days: 7

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t azzurra-services:ci .
      - name: smoke-check binary inside image
        run: |
          docker run --rm --entrypoint sh azzurra-services:ci \
            -c 'test -x /build/src/services'
